<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wits — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="/static/login/login.css">
</head>
<body>

<div class="wordmark">Wits University &mdash; Staff Portal</div>

<div class="login-card">
  <h1>Sign in</h1>
  <p>Manager and admin access</p>
  <div class="field">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@wits.ac.za" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" />
  </div>
  <button class="btn-primary" id="login-btn">Sign in</button>
  <div class="error-msg" id="login-error"></div>
</div>

<script>
  let auth;

  async function init() {
    const res = await fetch('/firebase-config');
    const config = await res.json();
    firebase.initializeApp(config);
    auth = firebase.auth();
    await auth.signOut()

    //(*changed)If already logged in, skip the login screen
    auth.onAuthStateChanged(async user => {
      if (user) await checkRoleAndRedirect(user);
    });
  }

  async function checkRoleAndRedirect(user) {
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    try {
      const token = await user.getIdToken();
      const res = await fetch('/role-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();

      if (data.role === 'admin') {
        window.location.href = '/admin';
      } else if (data.role === 'manager') {
        window.location.href = '/dashboard';
      } else if (data.role === 'client') {
        window.location.href = '/client';
      }
       else {
        await auth.signOut();
        err.textContent = 'Access denied. You are not registered as a manager or admin.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    } catch (e) {
      await auth.signOut();
      err.textContent = 'Something went wrong. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');

    if (!email || !password) {
      err.textContent = 'Please enter your email and password.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.style.display = 'none';

    try {
      const credential = await auth.signInWithEmailAndPassword(email, password);
      await checkRoleAndRedirect(credential.user);
    } catch (e) {
      err.textContent = 'Invalid email or password.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  init();
</script>
</body>
</html>
