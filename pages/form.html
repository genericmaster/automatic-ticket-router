<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wits Support — Submit a Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-900: #042C53;
    --blue-800: #0C447C;
    --blue-600: #185FA5;
    --blue-400: #378ADD;
    --blue-200: #85B7EB;
    --blue-100: #B5D4F4;
    --blue-50: #E6F1FB;
    --teal-600: #0F6E56;
    --teal-400: #1D9E75;
    --teal-50: #E1F5EE;
    --gray-900: #2C2C2A;
    --gray-600: #5F5E5A;
    --gray-200: #B4B2A9;
    --gray-100: #D3D1C7;
    --gray-50: #F1EFE8;
    --red-600: #A32D2D;
    --red-50: #FCEBEB;
  }

  body {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    background: var(--blue-900);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    right: -20%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(55, 138, 221, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    left: -10%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29, 158, 117, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--blue-200);
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0.7;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(133, 183, 235, 0.2);
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 560px;
    backdrop-filter: blur(12px);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    margin-bottom: 2.5rem;
  }

  .card-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .card-header h1 em {
    font-style: italic;
    color: var(--blue-200);
  }

  .card-header p {
    font-size: 14px;
    color: var(--blue-200);
    opacity: 0.7;
    line-height: 1.6;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--blue-400);
    margin: 1.25rem 0;
    opacity: 0.4;
  }

  .field {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue-200);
    opacity: 0.6;
    margin-bottom: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  input[type="text"],
  input[type="email"],
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(133, 183, 235, 0.25);
    border-radius: 10px;
    padding: 0.875rem 1rem;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: #fff;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    resize: none;
  }

  input[type="text"]::placeholder,
  input[type="email"]::placeholder,
  textarea::placeholder {
    color: rgba(133, 183, 235, 0.3);
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  textarea:focus {
    border-color: rgba(55, 138, 221, 0.6);
    background: rgba(255,255,255,0.07);
  }

  textarea {
    min-height: 140px;
    line-height: 1.6;
  }

  .submit-btn {
    width: 100%;
    padding: 1rem;
    background: var(--blue-400);
    border: none;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
    letter-spacing: 0.02em;
  }

  .submit-btn:hover { background: var(--blue-600); }
  .submit-btn:active { transform: scale(0.99); }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    display: none;
    margin-top: 1.25rem;
    padding: 1rem;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    text-align: center;
  }

  .status.success {
    display: block;
    background: rgba(29, 158, 117, 0.12);
    border: 0.5px solid rgba(29, 158, 117, 0.3);
    color: #5DCAA5;
  }

  .status.error {
    display: block;
    background: rgba(163, 45, 45, 0.12);
    border: 0.5px solid rgba(163, 45, 45, 0.3);
    color: #F09595;
  }

  .footer-note {
    margin-top: 1.5rem;
    font-size: 12px;
    color: var(--blue-200);
    opacity: 0.35;
    text-align: center;
    font-family: 'DM Mono', monospace;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="wordmark">Wits University &mdash; Support Portal</div>

<div class="card">
  <div class="card-header">
    <h1>Submit a <em>support</em> ticket</h1>
    <div class="divider"></div>
    <p>Describe your issue below. Our system will route your request to the right team automatically.</p>
  </div>

  <form id="ticketForm">
    <div class="field">
      <label>Your name</label>
      <input type="text" id="name" placeholder="e.g. Thendo Rakhi" required />
    </div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="senderEmail" placeholder="you@wits.ac.za" required />
    </div>

    <div class="field">
      <label>Subject</label>
      <input type="text" id="subject" placeholder="Brief description of the issue" required />
    </div>

    <div class="field">
      <label>Describe your issue</label>
      <textarea id="body" placeholder="Please provide as much detail as possible..." required></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Submit ticket</button>

    <div class="status" id="statusMsg"></div>
  </form>
</div>

<p class="footer-note">Powered by local AI routing &mdash; your data stays on campus</p>

<script>
  document.getElementById('ticketForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMsg');
    const name = document.getElementById('name').value.trim();
    const senderEmail = document.getElementById('senderEmail').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const body = document.getElementById('body').value.trim();

    const emailText = `From: ${name} <${senderEmail}>\nSubject: ${subject}\n\n${body}`;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Routing your ticket...';
    status.className = 'status';
    status.style.display = 'none';

    try {
      const response = await fetch('http://127.0.0.1:5000/ticket', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailText })
      });

      if (response.ok) {
        status.className = 'status success';
        status.textContent = 'Your ticket has been received and routed to the right team. You will hear back shortly.';
        document.getElementById('ticketForm').reset();
      } else {
        throw new Error('Server error');
      }
    } catch (err) {
      status.className = 'status error';
      status.textContent = 'Something went wrong. Please try again or contact support directly.';
    }

    status.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Submit ticket';
  });
</script>

</body>
</html>
