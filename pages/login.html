<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wits — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-bg:    #0C447C;
    --sidebar-bg-2:  #0A3A6B;
    --sidebar-muted: rgba(181,212,244,0.45);
    --main-bg:       #EEF4FB;
    --text-1:        #0C2340;
    --text-3:        #7AAAD4;
  }

  body {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    background: var(--sidebar-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  @keyframes up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .wordmark {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--sidebar-muted);
    margin-bottom: 2.5rem;
  }

  .login-card {
    background: #fff;
    border-radius: 14px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
    animation: up .4s ease both;
  }

  .login-card h1 { font-size: 1.4rem; font-weight: 400; color: var(--text-1); margin-bottom: .25rem; }
  .login-card p  { font-size: 13px; color: var(--text-3); margin-bottom: 2rem; }

  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: .4rem;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--main-bg);
    border: .5px solid rgba(55,138,221,.25);
    border-radius: 8px;
    padding: .7rem .875rem;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text-1);
    outline: none;
    transition: border-color .15s;
  }

  input::placeholder { color: var(--text-3); }
  input:focus { border-color: var(--sidebar-bg); }

  .btn-primary {
    width: 100%;
    padding: .75rem;
    background: var(--sidebar-bg);
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #fff;
    cursor: pointer;
    transition: background .15s;
    margin-top: .25rem;
  }

  .btn-primary:hover { background: var(--sidebar-bg-2); }
  .btn-primary:active { transform: scale(.99); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .error-msg {
    display: none;
    margin-top: .875rem;
    padding: .65rem .875rem;
    background: rgba(163,45,45,.1);
    border: .5px solid rgba(163,45,45,.25);
    border-radius: 6px;
    font-size: 12px;
    color: #A32D2D;
    text-align: center;
  }
</style>
</head>
<body>

<div class="wordmark">Wits University &mdash; Staff Portal</div>

<div class="login-card">
  <h1>Sign in</h1>
  <p>Manager and admin access</p>
  <div class="field">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@wits.ac.za" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" />
  </div>
  <button class="btn-primary" id="login-btn">Sign in</button>
  <div class="error-msg" id="login-error"></div>
</div>

<script>
  let auth;

  async function init() {
    const res = await fetch('/firebase-config');
    const config = await res.json();
    firebase.initializeApp(config);
    auth = firebase.auth();
    await auth.signOut()

    //(*changed)If already logged in, skip the login screen
    auth.onAuthStateChanged(async user => {
      if (user) await checkRoleAndRedirect(user);
    });
  }

  async function checkRoleAndRedirect(user) {
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    try {
      const token = await user.getIdToken();
      const res = await fetch('/role-check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();

      if (data.role === 'admin') {
        window.location.href = '/admin';
      } else if (data.role === 'manager') {
        window.location.href = '/dashboard';
      } else {
        await auth.signOut();
        err.textContent = 'Access denied. You are not registered as a manager or admin.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    } catch (e) {
      await auth.signOut();
      err.textContent = 'Something went wrong. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');

    if (!email || !password) {
      err.textContent = 'Please enter your email and password.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.style.display = 'none';

    try {
      const credential = await auth.signInWithEmailAndPassword(email, password);
      await checkRoleAndRedirect(credential.user);
    } catch (e) {
      err.textContent = 'Invalid email or password.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });

  init();
</script>
</body>
</html>
